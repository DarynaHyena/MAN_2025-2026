<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="./css/styles.css" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Classifier</title>
  </head>

  <body>
    <body>
      <h1>Введіть данні</h1>

      <form>
        <label for="temperature"
          >Данні про температуру: (в градусах цельсія)</label
        ><br />
        <input type="text" id="temperature" name="temperature" /><br />
        <label for="humidity">Данні про вологість:</label><br />
        <input type="text" id="humidity" name="humidity" /><br />
        <label for="wind"
          >Данні про швидкість повітря: (в метрах за секунду)</label
        ><br />
        <input type="text" id="wind" name="wind" /><br />
        <label for="precip">Відсоток опадів у вашому регіоні:</label><br />
        <input type="text" id="precip" name="precip" /><br />
        <label for="cloud">Данні про хмарність:</label><br />

        <label for="pressure">Данні про атмосферний тиск:</label><br />
        <input type="text" id="pressure" name="pressure" /><br />
        <label for="season">Данні про пору року:</label><br />

        <label for="location">Данні про тип рельєфу:</label><br />
      </form>
    </body>
  </body>
</html>
